[workspace]
name = "jax-nufft"
description = "Pure-JAX wgridder for radio interferometric imaging."
authors = ["jax-nufft contributors"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.24"
pip = "*"

[pypi-dependencies]
jax-nufft = { path = ".", editable = true }

# CPU stack lives in its own feature so we can platform-gate it: there is
# no `cpu` build of jax-finufft on linux-aarch64 in conda-forge, only the
# cuda variant. Anyone working on aarch64 uses the gpu env.
[feature.cpu]
platforms = ["osx-arm64", "linux-64"]

[feature.cpu.dependencies]
jax = ">=0.5.0"
jax-finufft = { version = ">=1.3.0", build = "cpu_*" }

[feature.gpu]
platforms = ["linux-64", "linux-aarch64"]
system-requirements = { cuda = "12.0" }

[feature.gpu.dependencies]
jax = ">=0.5.0"
jax-finufft = { version = ">=1.3.0", build = "cuda*" }
cuda-version = ">=12.0,<13"

[feature.test.dependencies]
pytest = ">=7.4"
pytest-benchmark = ">=4.0"
ducc0 = ">=0.34"
psutil = ">=5.9"

[feature.dev.dependencies]
ruff = ">=0.6.0"
mypy = ">=1.10"
pre-commit = ">=3.7"

[environments]
default = { features = ["cpu"], solve-group = "cpu" }
test = { features = ["cpu", "test"], solve-group = "cpu" }
dev = { features = ["cpu", "dev", "test"], solve-group = "cpu" }
gpu = { features = ["gpu", "test"], solve-group = "gpu" }

[tasks]
test = "pytest"
test-fast = "pytest -x -q"
lint = "ruff check src tests"
format = "ruff format src tests"
typecheck = "mypy src"
