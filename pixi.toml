[project]
name = "jax-nufft"
description = "Pure-JAX wgridder for radio interferometric imaging."
authors = ["jax-nufft contributors"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
pip = "*"

[pypi-dependencies]
jax = ">=0.4.30"
jax-finufft = ">=0.0.7"
jax-nufft = { path = ".", editable = true }

[feature.test.dependencies]
pytest = ">=7.4"
pytest-benchmark = ">=4.0"
ducc0 = ">=0.34"

[feature.dev.dependencies]
ruff = ">=0.6.0"
mypy = ">=1.10"
pre-commit = ">=3.7"

[feature.gpu]
platforms = ["linux-64"]
system-requirements = { cuda = "12.0" }

[feature.gpu.pypi-dependencies]
jax = { version = ">=0.4.30", extras = ["cuda12"] }

[environments]
default = { solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
dev = { features = ["dev", "test"], solve-group = "default" }
gpu = { features = ["gpu", "test"], solve-group = "gpu" }

[tasks]
test = "pytest"
test-fast = "pytest -x -q"
lint = "ruff check src tests"
format = "ruff format src tests"
typecheck = "mypy src"
