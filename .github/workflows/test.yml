name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          # Resolve the CPU test env from conda-forge (jax-finufft cpu
          # build); the lockfile pins exact versions for reproducibility.
          environments: test
          locked: true

      - name: Run pytest (fast)
        run: pixi run -e test test -ra

      - name: Run pytest (slow ducc parity)
        run: pixi run -e test test -ra --runslow

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: dev
          locked: true

      - name: ruff check
        run: pixi run -e dev lint

      - name: ruff format --check
        run: pixi run -e dev ruff format --check src tests

      - name: mypy
        run: pixi run -e dev typecheck
